 name: Deploy Landing Page → Hostgator

  on:
    push:
      branches: [main]
      paths:
        - "Produtos/mercado-ia-2025/pages/**"

  jobs:
    deploy:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Preparar arquivos para deploy
          run: |
            mkdir -p deploy/assets
            cp Produtos/mercado-ia-2025/pages/landing-page.html deploy/index.html
            cp Produtos/mercado-ia-2025/pages/quiz.html                    deploy/
            cp Produtos/mercado-ia-2025/pages/politica-de-privacidade.html deploy/
            cp Produtos/mercado-ia-2025/pages/termos-de-uso.html           deploy/
            cp Produtos/mercado-ia-2025/pages/favicon.svg                  deploy/
            cp -r Produtos/mercado-ia-2025/pages/assets/. deploy/assets/

        - name: FTP Deploy
          uses: SamKirkland/FTP-Deploy-Action@4.3.4
          with:
            server: ${{ secrets.FTP_SERVER }}
            username: ${{ secrets.FTP_USERNAME }}
            password: ${{ secrets.FTP_PASSWORD }}
            local-dir: ./deploy/
            server-dir: public_html/
            dangerous-clean-slate: false
