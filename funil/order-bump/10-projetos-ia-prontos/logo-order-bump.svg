<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
<defs>

  <!-- Background: deep navy → vivid blue diagonal -->
  <linearGradient id="bg" x1="10%" y1="0%" x2="90%" y2="100%">
    <stop offset="0%"   stop-color="#0A1535"/>
    <stop offset="100%" stop-color="#1D4ED8"/>
  </linearGradient>

  <!-- Gloss highlight — white radial at top center -->
  <radialGradient id="gloss" cx="50%" cy="0%" r="65%">
    <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.30"/>
    <stop offset="45%"  stop-color="#FFFFFF" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
  </radialGradient>

  <!-- Center depth glow — subtle blue radial -->
  <radialGradient id="depthGlow" cx="50%" cy="52%" r="42%">
    <stop offset="0%"   stop-color="#3B82F6" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
  </radialGradient>

  <!-- Bottom edge vignette -->
  <radialGradient id="vignette" cx="50%" cy="100%" r="55%">
    <stop offset="0%"   stop-color="#000000" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>

  <!-- Symbol gradient: bright top → slightly transparent bottom -->
  <linearGradient id="symGrad" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.68"/>
  </linearGradient>

  <!-- Symbol drop shadow -->
  <filter id="symShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#030B14" flood-opacity="0.65"/>
  </filter>

  <!-- Subtle inner glow on symbol edge -->
  <filter id="symGlow" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

</defs>

<!-- ── LAYER 1: Background ── -->
<rect width="1024" height="1024" fill="url(#bg)"/>

<!-- ── LAYER 2: Center depth glow ── -->
<ellipse cx="512" cy="530" rx="360" ry="320" fill="url(#depthGlow)"/>

<!-- ── LAYER 3: Top gloss highlight ── -->
<rect width="1024" height="1024" fill="url(#gloss)"/>

<!-- ── LAYER 4: Bottom vignette ── -->
<rect width="1024" height="1024" fill="url(#vignette)"/>

<!-- ── LAYER 5: Symbol — back plane (depth illusion) ── -->
<!--
  Z / Lightning bolt shape — two horizontal bars connected by a diagonal.
  The Z represents: AI speed, instant results, energy.
  Path centered at (0,0):
    Top bar:      y -150 to -82
    Diagonal:     top-right (130,-82) → bottom-left (-130,82)
    Bottom bar:   y 82 to 150
-->
<path transform="translate(530,530)"
      d="M -130,-150 L 130,-150 L 130,-82 L -130,82 L -130,150 L 130,150 L 130,82 L -130,-82 Z"
      fill="#FFFFFF"
      opacity="0.18"/>

<!-- ── LAYER 6: Symbol — front plane (main) ── -->
<path transform="translate(512,512)"
      d="M -130,-150 L 130,-150 L 130,-82 L -130,82 L -130,150 L 130,150 L 130,82 L -130,-82 Z"
      fill="url(#symGrad)"
      filter="url(#symShadow)"/>

<!-- ── LAYER 7: Symbol inner edge highlight (thin bright line on top-left of symbol) ── -->
<path transform="translate(512,512)"
      d="M -130,-150 L 130,-150 L 130,-82 L -130,82 L -130,150"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="2.5"
      stroke-opacity="0.45"
      stroke-linecap="round"
      stroke-linejoin="round"/>

</svg>
