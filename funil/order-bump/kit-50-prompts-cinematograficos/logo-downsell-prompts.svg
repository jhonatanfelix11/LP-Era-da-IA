<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
<defs>

  <!-- Background: deep indigo top-left -->
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#1E1155"/>
    <stop offset="58%"  stop-color="#2D1B69"/>
    <stop offset="100%" stop-color="#3730A3"/>
  </linearGradient>

  <!-- Bottom-right light area (split background, like reference 1) -->
  <linearGradient id="splitLight" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#F0EEF8" stop-opacity="0"/>
    <stop offset="100%" stop-color="#EDE9F4" stop-opacity="1"/>
  </linearGradient>

  <!-- Glass card highlight — top edge bright line -->
  <linearGradient id="cardTop" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.22"/>
    <stop offset="30%"  stop-color="#FFFFFF" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
  </linearGradient>

  <!-- Card inner glow (subtle purple center) -->
  <radialGradient id="cardGlow" cx="50%" cy="40%" r="55%">
    <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
  </radialGradient>

  <!-- Symbol: white for cards on top of the glass -->
  <linearGradient id="symBack" x1="0%" y1="0%" x2="30%" y2="100%">
    <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.50"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.28"/>
  </linearGradient>
  <linearGradient id="symMid" x1="0%" y1="0%" x2="30%" y2="100%">
    <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.72"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.48"/>
  </linearGradient>
  <linearGradient id="symFront" x1="0%" y1="0%" x2="30%" y2="100%">
    <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="1"/>
    <stop offset="100%" stop-color="#DDD6FE" stop-opacity="0.90"/>
  </linearGradient>

  <!-- Symbol drop shadow -->
  <filter id="symShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#1E1155" flood-opacity="0.55"/>
  </filter>

  <!-- Glass card blur effect -->
  <filter id="glassBlur" x="-5%" y="-5%" width="110%" height="110%">
    <feGaussianBlur stdDeviation="0.5"/>
  </filter>

</defs>

<!-- ── LAYER 1: Dark indigo background ── -->
<rect width="1024" height="1024" fill="url(#bg)"/>

<!-- ── LAYER 2: Split light area — bottom-right triangle ── -->
<polygon points="1024,380 1024,1024 380,1024" fill="url(#splitLight)"/>

<!-- ── LAYER 3: Glass card outer ring (faint border) ── -->
<rect x="96" y="96" width="832" height="832" rx="185"
      fill="rgba(255,255,255,0.06)"
      stroke="rgba(255,255,255,0.20)"
      stroke-width="1"/>

<!-- ── LAYER 4: Glass card main body ── -->
<rect x="128" y="128" width="768" height="768" rx="160"
      fill="rgba(255,255,255,0.13)"
      stroke="rgba(255,255,255,0.30)"
      stroke-width="1.5"/>

<!-- ── LAYER 5: Card inner glow ── -->
<rect x="128" y="128" width="768" height="768" rx="160" fill="url(#cardGlow)"/>

<!-- ── LAYER 6: Card top highlight (glass reflection) ── -->
<rect x="128" y="128" width="768" height="340" rx="160" fill="url(#cardTop)"/>

<!-- ── LAYER 7: Symbol — stacked prompt cards (3 cards in a deck) ──
  Each card: 280px wide × 88px tall, rx=18.
  Deck effect: back card offset +22px right and +18px down from center,
               mid card offset +11px right and +9px down,
               front card at center.
  Symbol centered at (512, 512):
    Card rect: x=-140, y=-44 (center of each card at 0,0)
-->

<!-- Back card -->
<rect transform="translate(534,530)"
      x="-140" y="-44" width="280" height="88" rx="18"
      fill="url(#symBack)"/>

<!-- Mid card -->
<rect transform="translate(523,521)"
      x="-140" y="-44" width="280" height="88" rx="18"
      fill="url(#symMid)"/>

<!-- Front card — with content lines suggesting text/prompts -->
<g transform="translate(512,512)" filter="url(#symShadow)">
  <rect x="-140" y="-44" width="280" height="88" rx="18"
        fill="url(#symFront)"/>
  <!-- Content lines (representing prompt text, in purple/glass color) -->
  <rect x="-108" y="-18" width="145" height="10" rx="5"
        fill="#1E1155" opacity="0.22"/>
  <rect x="-108" y="4"   width="110" height="10" rx="5"
        fill="#1E1155" opacity="0.22"/>
  <rect x="-108" y="26"  width="128" height="10" rx="5"
        fill="#1E1155" opacity="0.22"/>
  <!-- Small icon dot on right side of front card -->
  <circle cx="94" cy="4" r="10" fill="#1E1155" opacity="0.15"/>
</g>

<!-- ── LAYER 8: Top edge shine on outer glass ring ── -->
<path d="M 288,128 Q 512,110 736,128"
      fill="none"
      stroke="rgba(255,255,255,0.45)"
      stroke-width="1.5"
      stroke-linecap="round"/>

</svg>
