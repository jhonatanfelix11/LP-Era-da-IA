<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Neural lines — cardinal -->
  <line x1="16" y1="16" x2="16" y2="6.5"  stroke="#3b82f6" stroke-width="1"   opacity="0.55"/>
  <line x1="16" y1="16" x2="16" y2="25.5" stroke="#3b82f6" stroke-width="1"   opacity="0.55"/>
  <line x1="16" y1="16" x2="6.5"  y2="16" stroke="#3b82f6" stroke-width="1"   opacity="0.55"/>
  <line x1="16" y1="16" x2="25.5" y2="16" stroke="#3b82f6" stroke-width="1"   opacity="0.55"/>

  <!-- Neural lines — diagonal -->
  <line x1="16" y1="16" x2="8.5"  y2="8.5"  stroke="#818cf8" stroke-width="0.8" opacity="0.4"/>
  <line x1="16" y1="16" x2="23.5" y2="8.5"  stroke="#818cf8" stroke-width="0.8" opacity="0.4"/>
  <line x1="16" y1="16" x2="8.5"  y2="23.5" stroke="#818cf8" stroke-width="0.8" opacity="0.4"/>
  <line x1="16" y1="16" x2="23.5" y2="23.5" stroke="#818cf8" stroke-width="0.8" opacity="0.4"/>

  <!-- Outer nodes — cardinal -->
  <circle cx="16"   cy="6.5"  r="2"   fill="#60a5fa"/>
  <circle cx="16"   cy="25.5" r="2"   fill="#60a5fa"/>
  <circle cx="6.5"  cy="16"   r="2"   fill="#60a5fa"/>
  <circle cx="25.5" cy="16"   r="2"   fill="#60a5fa"/>

  <!-- Outer nodes — diagonal (smaller) -->
  <circle cx="8.5"  cy="8.5"  r="1.5" fill="#818cf8" opacity="0.75"/>
  <circle cx="23.5" cy="8.5"  r="1.5" fill="#818cf8" opacity="0.75"/>
  <circle cx="8.5"  cy="23.5" r="1.5" fill="#818cf8" opacity="0.75"/>
  <circle cx="23.5" cy="23.5" r="1.5" fill="#818cf8" opacity="0.75"/>

  <!-- Central core -->
  <circle cx="16" cy="16" r="6.5" fill="url(#core)"/>

  <!-- IA text -->
  <text x="16" y="19.2"
        text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-size="7"
        font-weight="900"
        fill="#0f172a"
        letter-spacing="-0.3">IA</text>
</svg>
